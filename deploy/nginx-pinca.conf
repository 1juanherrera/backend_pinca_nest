# ============================================================================
# PINCA — Reverse proxy del cutover STRANGLER (NestJS + CodeIgniter 4)
# ============================================================================
# Rutea a NestJS los dominios ya migrados y deja en CI4 todo lo demás + los
# endpoints DIFERIDOS (los que tocan capas de costo o la cadena `convertir`,
# que siguen en CI4 hasta la Fase 3).
#
# Verificado con golden tests: Nest devuelve respuestas idénticas a CI4 en los
# endpoints migrados (14/14 match). El frontend no cambia (misma base /api).
#
# Ajustá los `upstream` a tu despliegue:
#   - En Docker (misma red que el stack): usar los nombres de contenedor.
#   - Fuera de Docker: usar 127.0.0.1:<puerto>.
# ============================================================================

upstream pinca_nest {
    # Contenedor Nest (docker) o host:puerto. Nest escucha en /api también.
    server gestor-pinca-nest:3000;
    # server 127.0.0.1:3000;   # <- alternativa fuera de Docker
}

upstream pinca_ci4 {
    # Contenedor Apache de CodeIgniter 4.
    server gestor-pinca-app:80;
    # server 127.0.0.1:8080;   # <- alternativa fuera de Docker
}

server {
    listen 80;
    server_name _;

    # Cabeceras comunes para ambos upstreams (Authorization se pasa por defecto).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ─────────────────────────────────────────────────────────────────────
    # 1) ENDPOINTS DIFERIDOS → se quedan en CI4 aunque el dominio esté migrado.
    #    (Los location regex tienen prioridad sobre los prefix de abajo.)
    # ─────────────────────────────────────────────────────────────────────

    # Recepción prorrateada y lote sugerido → CI4 (aún no migrados).
    # `recibir/:idDetalle` (recepción de una línea) SÍ está migrada → cae al
    # prefijo /api/ordenes_compra de abajo (Nest). Verificada con cost-golden.
    # recibir-prorrateado + lote-sugerido YA MIGRADOS → Nest (reusan CapasService).
    location ~ ^/api/ordenes_compra/[0-9]+/(recibir-prorrateado|lote-sugerido) {
        proxy_pass http://pinca_nest;
    }

    # remisiones/:id/estado YA MIGRADO → Nest (prefijo /api/remisiones). La maquinaria de
    # STOCK de CI4 estaba MUERTA (enum sin 'Despachada' + tabla remision_consumo_capas inexistente);
    # Nest replica solo la transición de estado viva.
    # NOTA: cotizaciones/:id/convertir y remisiones/:id/convertir → Nest (prefijo).
    # Nest CORRIGE bugs de CI4 en estos endpoints: CI4 500ea al convertir cotización
    # y deja la conversión de remisión a medias (no copia líneas ni marca Facturada).
    # Verificado con test/convert-golden.mjs.

    # Preparaciones: costos_resumen → CI4. verificar-disponibilidad YA MIGRADO (Requisiciones/MRP).
    # index/create/item/:id/show/update SÍ están migrados → prefijo /api/preparaciones (Nest).
    location = /api/preparaciones/verificar-disponibilidad {
        proxy_pass http://pinca_nest;
    }
    # preparaciones/costos_resumen YA MIGRADO → cae al prefijo /api/preparaciones (Nest).
    # (preparaciones/:id/costos ahora migrado → Nest vía prefijo.)

    # Formulaciones: simulaciones de costo YA MIGRADAS → Nest (caen al prefijo /api/formulaciones).
    # (costos/:id, costos/:id/proveedor/:pid, recalcular_costos/:id/:vol, :id/proveedores, :id/opciones-ingredientes)

    # Inventario por bodega (read paginado legacy + BOM) YA MIGRADO → Nest.
    location ~ ^/api/bodegas/inventario/ {
        proxy_pass http://pinca_nest;
    }

    # ── Inventario Fase 3: LECTURAS + ajuste-manual (FIFO) → Nest; resto → CI4 ──
    # ajuste-manual (FIFO), traspaso, removeFromBodega migrados y verificados.
    location = /api/inventario/ajuste-manual {
        proxy_pass http://pinca_nest;
    }
    location = /api/inventario/traspaso {
        proxy_pass http://pinca_nest;
    }
    location ~ ^/api/inventario/[0-9]+/bodega/[0-9]+$ {
        proxy_pass http://pinca_nest;
    }
    # Lecturas migradas → Nest (global, capas/bodegas, capas/preparacion, :id/capas)
    location ~ ^/api/inventario/(global|capas/) {
        proxy_pass http://pinca_nest;
    }
    location ~ ^/api/inventario/[0-9]+/capas$ {
        proxy_pass http://pinca_nest;
    }
    # El resto de /api/inventario (traspaso, ajuste-manual, :id/bodega/:id — tocan
    # capas) se queda en CI4 vía el prefijo /api/inventario de abajo.

    # Sincronización: partes NO-IA + gestión de clusters → Nest.
    # Solo la clasificación por LLM (`ia/clasificar`), `pendientes` (buscarFuzzy) y
    # los reemplazos manuales de fórmula quedan en CI4.
    location = /api/sincronizacion/ia/clasificar { proxy_pass http://pinca_nest; } # LLM (Gemini/Anthropic, env-detected)
    location ~ ^/api/sincronizacion/ia/          { proxy_pass http://pinca_nest; } # clusters/fusionar/descartar/verificar/revertir
    location = /api/sincronizacion/stats      { proxy_pass http://pinca_nest; }
    location = /api/sincronizacion/maestro    { proxy_pass http://pinca_nest; }
    location = /api/sincronizacion/duplicados { proxy_pass http://pinca_nest; }
    location = /api/sincronizacion/huerfanos  { proxy_pass http://pinca_nest; }
    location = /api/sincronizacion/merge      { proxy_pass http://pinca_nest; }
    location = /api/sincronizacion/pendientes { proxy_pass http://pinca_nest; } # buscarFuzzy + similar_text
    # Reemplazo manual de MP en fórmulas (buscar/reemplazar A→B + deshacer) → Nest:
    location ~ ^/api/sincronizacion/uso-formulas/           { proxy_pass http://pinca_nest; }
    location = /api/sincronizacion/reemplazar-formula        { proxy_pass http://pinca_nest; }
    location = /api/sincronizacion/reemplazos                { proxy_pass http://pinca_nest; }
    location ~ ^/api/sincronizacion/reemplazos/[0-9]+/revertir { proxy_pass http://pinca_nest; }
    location /api/sincronizacion              { proxy_pass http://pinca_ci4; } # solo `pendientes` (fuzzy)

    # ─────────────────────────────────────────────────────────────────────
    # 2) DOMINIOS MIGRADOS → NestJS.
    #    (proveedor_items NO está acá: es otro prefijo y cae a CI4 abajo.)
    # ─────────────────────────────────────────────────────────────────────
    location /api/health          { proxy_pass http://pinca_nest; }
    location /api/unidades         { proxy_pass http://pinca_nest; }
    location /api/categorias       { proxy_pass http://pinca_nest; }
    location /api/bodegas          { proxy_pass http://pinca_nest; }
    location /api/instalaciones    { proxy_pass http://pinca_nest; }
    location /api/proveedores      { proxy_pass http://pinca_nest; }
    location /api/clientes         { proxy_pass http://pinca_nest; }
    location /api/numeracion       { proxy_pass http://pinca_nest; }
    location /api/cotizaciones     { proxy_pass http://pinca_nest; }
    location /api/facturas         { proxy_pass http://pinca_nest; }
    location /api/catalogo         { proxy_pass http://pinca_nest; }
    location /api/ordenes_compra   { proxy_pass http://pinca_nest; }
    location /api/remisiones       { proxy_pass http://pinca_nest; }
    location /api/movimientos      { proxy_pass http://pinca_nest; }
    location /api/preparaciones    { proxy_pass http://pinca_nest; }
    location /api/formulaciones    { proxy_pass http://pinca_nest; }
    location /api/formulacion_item { proxy_pass http://pinca_nest; }
    # Inventario: prefijo → CI4 (escrituras); las lecturas ya las capturan los
    # regex de arriba (tienen prioridad sobre este prefijo).
    location /api/inventario       { proxy_pass http://pinca_ci4; }
    # Bloque financiero (cobranza) — pagos/NC alimentan recalcularSaldo de facturas:
    location /api/pagos_cliente    { proxy_pass http://pinca_nest; }
    location /api/notas_credito    { proxy_pass http://pinca_nest; }
    location /api/cartera          { proxy_pass http://pinca_nest; }
    location /api/gestiones_cobro  { proxy_pass http://pinca_nest; }
    # AUTH (login/refresh/logout/me/crear/mi-perfil/mi-password/mi-actividad) → Nest.
    # Nest EMITE los tokens (mismo TOKEN_SECRET, bcrypt $2y$↔$2a$ compatible).
    # Nota: /api/crear estaba MUERTO en CI4 (jwt-except → 403 siempre); Nest lo arregla.
    location = /api/login                  { proxy_pass http://pinca_nest; }
    location = /api/crear                  { proxy_pass http://pinca_nest; }
    location /api/auth/                     { proxy_pass http://pinca_nest; }
    location = /api/usuarios/mi-password    { proxy_pass http://pinca_nest; }
    location = /api/usuarios/mi-perfil      { proxy_pass http://pinca_nest; }
    location = /api/usuarios/mi-actividad   { proxy_pass http://pinca_nest; }
    # RBAC (roles/permisos/módulos + cambiar rol) → Nest:
    location /api/roles/                     { proxy_pass http://pinca_nest; }
    # Configuración del sistema (CRUD admin) → Nest:
    location /api/configuracion             { proxy_pass http://pinca_nest; }
    # Empresa: SOLO GET/PUT /api/empresa (exacto) → Nest. Los subpaths de logo
    # (/empresa/logo, /empresa/logo-base64) caen al `location /` → CI4, que tiene
    # el filesystem public/uploads. NO poner prefijo acá o se roban el logo.
    location = /api/empresa                 { proxy_pass http://pinca_nest; }
    # Logo: endpoints MIGRADOS a Nest. Nest escribe los archivos bajo PINCA_PUBLIC_DIR
    # (uploads/empresa/). ⚠️ DEPLOY: nginx debe servir /uploads/ desde ese mismo dir
    # (o Nest vía ServeStatic) para que el frontend cargue la imagen del logo.
    location = /api/empresa/logo            { proxy_pass http://pinca_nest; }
    location = /api/empresa/logo-base64     { proxy_pass http://pinca_nest; }
    # Panel Principal (agrega KPIs) → Nest:
    location = /api/dashboard               { proxy_pass http://pinca_nest; }
    # ItemProveedor (CRUD + vincular + resolverItemGeneral) y proveedor_items → Nest:
    location /api/item_proveedores          { proxy_pass http://pinca_nest; }
    location /api/proveedor_items           { proxy_pass http://pinca_nest; }
    # Requisiciones de compra (+ MRP sugerir/convertir) → Nest:
    location /api/requisiciones              { proxy_pass http://pinca_nest; }
    # Notificaciones (lista + marcar leída + lazy-cron de automáticas) → Nest:
    location /api/notificaciones             { proxy_pass http://pinca_nest; }
    # Auditoría (login-attempts + movimientos, read-only admin) → Nest:
    location /api/auditoria                  { proxy_pass http://pinca_nest; }
    # Salud del sistema (dashboard de calidad de datos) → Nest:
    location /api/salud-sistema              { proxy_pass http://pinca_nest; }
    # Trazabilidad de lote (read-only) → Nest:
    location /api/trazabilidad               { proxy_pass http://pinca_nest; }
    # Búsqueda global Cmd+K (read-only) → Nest:
    location = /api/search                   { proxy_pass http://pinca_nest; }
    # Comparador de precios (por_item / por_proveedor / historial, read-only) → Nest:
    location /api/comparador                 { proxy_pass http://pinca_nest; }
    # Item legacy (/item_general CRUD full-item + buscar fuzzy, /items) → Nest.
    # OJO: el delete de CI4 estaba MUERTO (formulaciones.deleted_at no existe → 500); Nest lo arregla.
    location /api/item_general               { proxy_pass http://pinca_nest; }
    location /api/items                      { proxy_pass http://pinca_nest; }
    # Costeo: costos_item (PUT) + costos_indirectos (CRUD) → Nest:
    location /api/costos_item                { proxy_pass http://pinca_nest; }
    location /api/costos_indirectos          { proxy_pass http://pinca_nest; }
    # Costos-producción COMPLETO → Nest (index/show con cálculo de costos por proveedor
    # más barato — matching link/exacto/substring, determinístico — + historia).
    location /api/costos-produccion          { proxy_pass http://pinca_nest; }

    # ─────────────────────────────────────────────────────────────────────
    # 3) TODO LO DEMÁS → CI4 (login, auth, dashboard, inventario, capas,
    #    formulaciones, preparaciones, sincronizacion, proveedor_items, etc.)
    # ─────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://pinca_ci4;
    }
}

# ── Notas de rollout ────────────────────────────────────────────────────────
# - AUTH ya MIGRADO a Nest: /api/login, /api/crear, /api/auth/* (refresh, logout,
#   me), /api/usuarios/mi-* → Nest EMITE los tokens (mismo TOKEN_SECRET). bcrypt de
#   PHP ($2y$) y de bcryptjs ($2a$) son verificables por ambos backends.
#   Rollback: comentá los `location` de auth y CI4 los vuelve a servir.
# - Rollback instantáneo: si algo falla, comentá los `location /api/<dominio>`
#   del bloque (2) y esas rutas vuelven a CI4 sin redeploy de la app.
# - Antes de activar cada dominio, correr los golden tests:
#     node pinca_backend_nest/test/golden-compare.mjs
